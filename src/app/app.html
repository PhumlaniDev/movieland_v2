<!-- ── NAV ──────────────────────────────────────────── -->
<header
  class="fixed top-0 left-0 right-0 z-40 bg-zinc-950/80 backdrop-blur-xl border-b border-white/5"
>
  <nav class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <a routerLink="/" class="font-display text-xl font-black text-white tracking-tight">
      MOVIE<span class="text-amber-400">APP</span>
    </a>
    <div class="flex items-center gap-6">
      <a
        routerLink="/"
        routerLinkActive="text-amber-400"
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-zinc-400 hover:text-white transition-colors text-sm font-medium"
      >
        Home
      </a>
      <a
        routerLink="/search"
        routerLinkActive="text-amber-400"
        class="text-zinc-400 hover:text-white transition-colors text-sm font-medium flex items-center gap-1.5"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          />
        </svg>
        Search
      </a>
    </div>
  </nav>
</header>

<!-- ── CONTENT ───────────────────────────────────────── -->
<main class="bg-zinc-950 min-h-screen text-white pt-16">
  <router-outlet />
</main>
