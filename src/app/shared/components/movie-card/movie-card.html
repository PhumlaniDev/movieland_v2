<div
  class="group relative rounded-xl overflow-hidden bg-zinc-900 shadow-lg hover:scale-105 hover:shadow-2xl hover:shadow-amber-500/20 transition-all duration-300 cursor-pointer"
  [routerLink]="['/movie', movie.id]"
>
  <!-- Poster -->
  <div class="aspect-[2/3] overflow-hidden">
    <img
      [src]="posterUrl"
      [alt]="movie.title"
      loading="lazy"
      class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
      (error)="onImgError($event)"
    />
  </div>

  <!-- Gradient overlay -->
  <div
    class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"
  ></div>

  <!-- Rating badge -->
  <div
    class="absolute top-2 right-2 flex items-center gap-1 px-2 py-1 bg-black/70 backdrop-blur-sm rounded-full text-xs font-bold"
    [class]="ratingColor"
  >
    ★ {{ movie.vote_average | number: '1.1-1' }}
  </div>

  <!-- Watchlist button -->
  <button
    class="absolute top-2 left-2 p-1.5 rounded-full bg-black/70 backdrop-blur-sm text-white hover:text-amber-400 transition-colors duration-200 z-10"
    (click)="onWatchlist($event)"
    [attr.aria-label]="inWatchlist() ? 'Remove from watchlist' : 'Add to watchlist'"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="w-4 h-4"
      viewBox="0 0 24 24"
      [attr.fill]="inWatchlist() ? 'currentColor' : 'none'"
      stroke="currentColor"
      stroke-width="2"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"
      />
    </svg>
  </button>

  <!-- Info overlay -->
  <div
    class="absolute bottom-0 left-0 right-0 p-3 translate-y-2 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300"
  >
    <h3 class="text-white font-bold text-sm leading-tight line-clamp-2 font-display">
      {{ movie.title }}
    </h3>
    <p class="text-zinc-400 text-xs mt-1">
      {{ movie.release_date | date: 'yyyy' }}
    </p>
  </div>
</div>
